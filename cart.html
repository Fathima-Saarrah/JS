<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Cart</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f9f9f9; }
    h1 { margin-bottom: 20px; }
    .cart-item { background: #fff; padding: 10px; margin-bottom: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
    .cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
    .cart-details { flex: 1; margin-left: 10px; }
    .cart-details h3 { margin: 0; font-size: 16px; }
    .cart-details p { margin: 2px 0; font-size: 12px; color: #666; }
    .price { font-weight: bold; }
  </style>
</head>
<body>
  <h1>🛒 My Cart</h1>
  <div id="cart-container"></div>

<script>
  // Load cart from localStorage
  const cart = JSON.parse(localStorage.getItem('cart')) || [];
  const container = document.getElementById('cart-container');

  if (cart.length === 0) {
    container.innerHTML = "<p>Your cart is empty.</p>";
  } else {
    let total = 0;

    cart.forEach((item, index) => {
      const div = document.createElement('div');
      div.className = "cart-item";
      div.innerHTML = `
        <img src="${item.img}" alt="${item.name}">
        <div class="cart-details">
          <h3>${item.name}</h3>
          <p>${item.weight}</p>
          <p class="price">₹${item.price} x ${item.quantity || 1}</p>
          <p>Total: ₹${item.price * (item.quantity || 1)}</p>
        </div>
        <button class="remove-btn">❌ Remove</button>
      `;

      // Remove functionality (decrease quantity instead of deleting immediately)
      div.querySelector('.remove-btn').addEventListener('click', () => {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        if (cart[index].quantity && cart[index].quantity > 1) {
          cart[index].quantity -= 1; // decrease quantity
        } else {
          cart.splice(index, 1); // remove product if quantity is 1
        }

        localStorage.setItem('cart', JSON.stringify(cart));
        location.reload(); // refresh cart page
      });

      container.appendChild(div);

      // Add to total (multiply by quantity)
      total += item.price * (item.quantity || 1);
    });

    // Show total at the bottom
    const totalDiv = document.createElement('div');
    totalDiv.style.marginTop = "20px";
    totalDiv.style.fontWeight = "bold";
    totalDiv.textContent = `Grand Total: ₹${total}`;
    container.appendChild(totalDiv);
  }
</script>
</body>
</html>
